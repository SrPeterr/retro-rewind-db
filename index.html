<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>REWIND — Retro Rewind VHS Database</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="site-header">
  <div class="header-top">
    <span class="header-ticker">▶ REWIND — COMMUNITY VHS DATABASE</span>
    <span class="header-date" id="clock">-- : -- : --</span>
  </div>
  <div class="header-main">
    <div class="logo">
      <a href="/" class="logo-link">
        <div class="vhs-icon"></div>
        <div class="logo-text">
          <h1>REWIND</h1>
          <p>retro rewind · vhs catalog · community edition</p>
        </div>
      </a>
    </div>
    <div class="header-stats">
      <span class="stat-pill" id="stat-total">⬛ 0 TAPES</span>
      <span class="stat-pill" id="stat-limited">★ 0 LIMITED</span>
      <span class="stat-pill" id="stat-genres">◈ 0 GENRES</span>
    </div>
  </div>
</header>

<main class="container">

  <!-- GRID VIEW -->
  <div id="grid-view">
    <div class="controls-bar">
      <div class="search-wrap">
        <input type="text" id="search" placeholder="Search by name, SKU..." oninput="renderGrid()">
      </div>
      <select id="filter-genre" onchange="renderGrid()">
        <option value="">ALL GENRES</option>
      </select>
      <select id="filter-limited" onchange="renderGrid()">
        <option value="">ALL EDITIONS</option>
        <option value="yes">★ LIMITED ONLY</option>
        <option value="no">STANDARD ONLY</option>
      </select>
    </div>

    <div class="grid-header">
      <span class="grid-title" id="results-count">— TAPES IN COLLECTION</span>
      <div class="sort-wrap">
        <span class="sort-label">SORT:</span>
        <select id="sort" onchange="renderGrid()">
          <option value="newest">NEWEST</option>
          <option value="oldest">OLDEST</option>
          <option value="name">NAME A–Z</option>
          <option value="rating-stars">TOP RATED</option>
        </select>
      </div>
    </div>

    <div class="vhs-grid" id="grid">
      <div class="empty-state">
        <div class="empty-vhs"></div>
        <p class="empty-title">LOADING...</p>
      </div>
    </div>
  </div>

  <!-- DETAIL VIEW -->
  <div id="detail-view" style="display:none">
    <div id="detail-content"></div>
  </div>

</main>

<footer class="site-footer">
  REWIND — COMMUNITY VHS DATABASE &nbsp;·&nbsp; FOR
  <a href="https://store.steampowered.com/app/3552140/Retro_Rewind__Video_Store_Simulator/" target="_blank">RETRO REWIND</a>
</footer>

<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
